<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>눈길 사이드바</title>
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f6f7f9;
      color: #2f3440;
    }

    .demo-page {
      min-height: 100vh;
      position: relative;
    }

    .demo-header {
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 18px;
    }

    .menu-button {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .menu-icon {
      width: 24px;
      height: 18px;
      position: relative;
    }

    .menu-icon span {
      position: absolute;
      left: 0;
      height: 2px;
      border-radius: 999px;
      background: #7a7f89;
    }

    .menu-icon span:first-child {
      width: 18px;
      top: 2px;
    }

    .menu-icon span:last-child {
      width: 12px;
      top: 11px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.14);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 40;
    }

    .sidebar-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: #ffffff;
      border-right: 1px solid #eceef2;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.05);
      transform: translateX(-100%);
      transition: transform 0.24s ease;
      z-index: 50;
      display: flex;
      flex-direction: column;
    }

    .sidebar.is-open {
      transform: translateX(0);
    }

    .sidebar-header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #f1f3f5;
      flex-shrink: 0;
    }

    .sidebar-brand {
      font-size: 19px;
      font-weight: 600;
      color: #2f3440;
      letter-spacing: -0.3px;
    }

    .sidebar-close {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #8a9099;
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
    }

    .sidebar-close:hover {
      background: #f5f6f8;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 14px;
    }

    .sidebar-group {
      margin-bottom: 35px;
    }

    .sidebar-divider {
      height: 1px;
      background: #f0f2f5;
      margin: 16px 8px;
    }

    .sidebar-add-button {
  width: calc(100% - 8px);
  height: 44px;
  margin: 0 auto;
  border: none;
  background: linear-gradient(180deg, #8bb5f6 0%, #73a2f0 100%);
  color: #ffffff;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 10px 20px rgba(120, 163, 234, 0.24);
}

.sidebar-add-button:hover {
  /* background: #6f9ae3; */
  transform: translateY(-1px);
  box-shadow: 0 12px 22px rgba(120, 163, 234, 0.3);
}

.sidebar-add-plus {
  font-size: 17px;
  font-weight: 500;
  line-height: 1;
  position: relative;
  top: -1px;
}

.sidebar-add-button:active {
  transform: translateY(0);
  box-shadow: 0 6px 12px rgba(120, 163, 234, 0.2);
}

.sidebar-add-plus {
  font-size: 17px;
  font-weight: 500;
  line-height: 1;
  position: relative;
  top: -1px;
}

    .sidebar-section-label {
      margin: 0 8px 10px;
      font-size: 13px;
      font-weight: 400;
      color: #a0a6b0;
      letter-spacing: -0.1px;
      text-transform: none;
    }

    .sidebar-menu-list,
    .workspace-list,
    .recent-list,
    .bottom-menu-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-menu-item,
    .workspace-item,
    .recent-item,
    .bottom-menu-item {
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: none;
      background: transparent;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
      color: #4b525d;
      transition: background 0.18s ease;
    }

    .sidebar-menu-item:hover,
    .workspace-item:hover,
    .recent-item:hover,
    .bottom-menu-item:hover {
      background: #f5f6f8;
    }

    .sidebar-menu-item.is-active {
      background: #f1f3f5;
      color: #2f3440;
    }

    .sidebar-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a3a9b3;
      flex-shrink: 0;
    }

    .sidebar-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .workspace-content,
    .recent-content {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .sidebar-text {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 350;
      line-height: 1.35;
      letter-spacing: -0.2px;
      color: #4b525d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace-meta,
    .recent-meta {
      font-size: 12px;
      color: #9aa1ab;
      margin-top: 2px;
      line-height: 1.3;
    }

    .workspace-item,
    .recent-item {
      align-items: center;
    }

    .sidebar-profile {
      padding: 14px;
      border-top: 1px solid #f1f3f5;
      background: #fcfcfd;
      flex-shrink: 0;
    }

    .sidebar-profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #eef0f3;
      background: #ffffff;
      border-radius: 14px;
    }

    .sidebar-profile-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #eceef2;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a2a8b1;
        flex-shrink: 0;
        overflow: hidden;
        }

        .sidebar-profile-avatar svg {
        width: 30px;
        height: 30px;
        display: block;
        }

    .sidebar-profile-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .sidebar-profile-name {
      font-size: 14px;
      font-weight: 600;
      color: #313641;
      letter-spacing: -0.2px;
    }

    .sidebar-profile-email {
      font-size: 12px;
      color: #99a0aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 84vw;
        max-width: 290px;
      }
    }
  </style>
</head>

  <script>
    const openSidebarButton = document.getElementById("openSidebarButton");
    const closeSidebarButton = document.getElementById("closeSidebarButton");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const sidebar = document.getElementById("sidebar");

    function openSidebar() {
      sidebar.classList.add("is-open");
      sidebarOverlay.classList.add("is-open");
    }

    function closeSidebar() {
      sidebar.classList.remove("is-open");
      sidebarOverlay.classList.remove("is-open");
    }

    openSidebarButton.addEventListener("click", openSidebar);
    closeSidebarButton.addEventListener("click", closeSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeSidebar();
    });
  </script>
