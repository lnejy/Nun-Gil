<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>집중도 레포트 - 눈길</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --p: #78a3ea;
            --inner-bg: rgba(255, 255, 255, 0.6);
            --text-dark: #2f3440;
            --text-gray: #a0a6b0;
            --border: #eceef2;
            --tr: .3s cubic-bezier(.4, 0, .2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background:
                radial-gradient(ellipse 75% 55% at 10% 0%, rgba(168, 200, 255, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 65% 50% at 90% 0%, rgba(147, 184, 250, 0.3) 0%, transparent 60%),
                #fbfcfd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ── 전체 래퍼 ── */
        .app-wrapper {
            width: 95vw;
            height: 90vh;
            background-color: var(--inner-bg);
            backdrop-filter: blur(30px) saturate(150%);
            border-radius: 40px;
            display: flex;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* ── 왼쪽 패널 ── */
        .left-panel {
            width: 42%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        /* 왼쪽 상단 고정 영역 */
        .left-header {
            padding: 44px 44px 24px;
            flex-shrink: 0;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--text-gray);
            margin-bottom: 28px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-dark);
            transform: translateX(-3px);
        }

        .report-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .report-subtitle {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        .avg-score {
            font-size: 60px;
            font-weight: 900;
            color: var(--p);
            line-height: 1;
        }

        .avg-score .unit {
            font-size: 22px;
            font-weight: 700;
            vertical-align: top;
            margin-left: 4px;
        }

        /* 왼쪽 하단: 스크롤되는 학습 기록 목록 */
        .left-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px 44px 28px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .list-section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 12px;
            padding-top: 4px;
        }

        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            gap: 12px;
            cursor: pointer;
            transition: var(--tr);
            margin-bottom: 8px;
            text-align: left;
            width: 100%;
            font-family: inherit;
        }

        .session-item:hover {
            border-color: var(--p);
            box-shadow: 0 4px 14px rgba(120, 163, 234, 0.1);
        }

        .session-item.is-active {
            border-color: var(--p);
            background: #f0f5ff;
            box-shadow: 0 4px 14px rgba(120, 163, 234, 0.12);
        }

        .session-info { min-width: 0; flex: 1; }
        .session-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .session-meta {
            font-size: 11px;
            color: var(--text-gray);
        }

        .session-score-badge {
            font-size: 20px;
            font-weight: 900;
            color: var(--p);
            flex-shrink: 0;
            min-width: 52px;
            text-align: right;
        }

        .session-score-badge span {
            font-size: 12px;
            font-weight: 600;
        }

        /* ── 오른쪽 패널 ── */
        .right-panel {
            flex: 1;
            padding: 50px 50px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* 빈 상태 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            gap: 14px;
        }

        .empty-state i {
            font-size: 40px;
            color: #c8d4e8;
        }

        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }

        /* 상세 뷰 */
        .detail-view { display: none; }
        .detail-view.is-visible { display: block; }

        .detail-doc-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .detail-doc-meta {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 28px;
        }

        .detail-score-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .detail-score-label {
            font-size: 13px;
            color: var(--text-gray);
        }

        .detail-score-num {
            font-size: 64px;
            font-weight: 900;
            color: var(--p);
            line-height: 1;
        }

        .detail-score-num .unit {
            font-size: 22px;
            font-weight: 700;
            vertical-align: top;
            margin-left: 4px;
        }

        /* 지표 카드 그리드 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .metric-card {
            background: white;
            padding: 22px 16px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--tr);
        }

        .metric-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.05); }

        .metric-label {
            font-size: 11px;
            color: var(--text-gray);
            margin-bottom: 8px;
            display: block;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
        }

        /* 점수 산출 내역 */
        .detail-section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 14px;
        }

        .score-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .score-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-card-label {
            font-size: 12px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .score-card-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 10px; }
    </style>
</head>

<body>
    <div class="app-wrapper">

        <!-- 왼쪽: 전체 평균 + 학습 기록 목록 -->
        <div class="left-panel">
            <div class="left-header">
                <button class="back-btn" onclick="history.back()">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="report-title">집중도 레포트</div>
                <div class="report-subtitle" id="avgSubtitle">학습 세션 데이터를 불러오는 중...</div>
                <div class="avg-score" id="avgScore">
                    --<span class="unit">점</span>
                </div>
            </div>

            <div class="left-scroll">
                <div class="list-section-label">학습 기록</div>
                <div id="sessionList">
                    <div style="text-align:center;color:var(--text-gray);font-size:13px;padding:24px 0;">불러오는 중...</div>
                </div>
            </div>
        </div>

        <!-- 오른쪽: 상세 뷰 -->
        <div class="right-panel">
            <div class="empty-state" id="emptyState">
                <i class="fa-regular fa-chart-bar"></i>
                <p>학습 기록을 선택하면<br>상세 집중도 리포트를 볼 수 있어요.</p>
            </div>

            <div class="detail-view" id="detailView">
                <div class="detail-doc-name" id="detailDocName"></div>
                <div class="detail-doc-meta" id="detailDocMeta"></div>

                <div class="detail-score-row">
                    <div>
                        <div class="detail-score-label">집중도 점수</div>
                    </div>
                    <div class="detail-score-num" id="detailScore">
                        --<span class="unit">점</span>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">10분당 경고 횟수</span>
                        <div class="metric-value" id="detailWarnRate">--</div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">경고창 평균 반응 시간</span>
                        <div class="metric-value" id="detailReactTime">--</div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">정상 응시 비율</span>
                        <div class="metric-value" id="detailGazeRatio">--</div>
                    </div>
                </div>

                <div class="detail-section-title">점수 산출 내역</div>
                <div class="score-breakdown">
                    <div class="score-card">
                        <span class="score-card-label">정상 응시 점수</span>
                        <span class="score-card-value" id="detailSGaze">--</span>
                    </div>
                    <div class="score-card">
                        <span class="score-card-label">경고 점수</span>
                        <span class="score-card-value" id="detailSWarn">--</span>
                    </div>
                    <div class="score-card">
                        <span class="score-card-label">반응 점수</span>
                        <span class="score-card-value" id="detailSReact">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { requireAuth } from '/src/lib/auth.js'
        import { sb }         from '/src/lib/supabase.js'

        function computeScore(T, W, F, R) {
            if (T <= 0) return { score: 0, sGaze: 0, sWarn: 0, sReact: 0 }
            const sGaze  = (F / T) * 50
            const sWarn  = Math.max(0, 30 * (1 - (W * 600 / T) / 5))
            const sReact = W === 0 ? 20 : Math.max(0, 20 * (1 - (R - 1) / 9))
            return {
                score:  Math.round(sGaze + sWarn + sReact),
                sGaze:  Math.round(sGaze * 10) / 10,
                sWarn:  Math.round(sWarn * 10) / 10,
                sReact: Math.round(sReact * 10) / 10,
            }
        }

        const session = await requireAuth()
        if (!session) throw new Error('unauthenticated')
        const user = session.user

        // ── 전체 학습 기록 로드 ────────────────────────────
        const { data: sessions } = await sb
            .from('study_sessions')
            .select('id, start_time, duration_minutes, alert_count, focus_time_seconds, avg_alert_response_seconds, documents(file_name)')
            .eq('user_id', user.id)
            .eq('status', 'COMPLETED')
            .order('start_time', { ascending: false })

        const avgSubtitleEl = document.getElementById('avgSubtitle')
        const avgScoreEl    = document.getElementById('avgScore')
        const listEl        = document.getElementById('sessionList')

        if (!sessions || sessions.length === 0) {
            avgSubtitleEl.textContent = '아직 완료된 학습 세션이 없어요.'
            avgScoreEl.innerHTML = '--<span class="unit">점</span>'
            listEl.innerHTML = '<div style="text-align:center;color:var(--text-gray);font-size:13px;padding:24px 0;">학습 기록이 없어요.</div>'
        } else {
            // 전체 평균 점수 계산
            let sumScore = 0
            const computed = sessions.map(s => {
                const T = (s.duration_minutes ?? 0) * 60
                const W = s.alert_count ?? 0
                const F = s.focus_time_seconds ?? 0
                const R = s.avg_alert_response_seconds ?? 0
                const result = computeScore(T, W, F, R)

                const warnRate  = T > 0 ? ((W / (T / 60)) * 10).toFixed(1) : '0.0'
                const gazeRatio = T > 0 ? ((F / T) * 100).toFixed(1)       : '0.0'
                const reactTime = W > 0 ? R.toFixed(1)                      : '0.0'

                sumScore += result.score

                const date    = new Date(s.start_time)
                const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`
                const durMin  = Math.round(s.duration_minutes ?? 0)

                return {
                    id: s.id,
                    title: s.documents?.file_name ?? '알 수 없는 문서',
                    dateStr,
                    durMin,
                    warnRate,
                    gazeRatio,
                    reactTime,
                    ...result,
                }
            })

            const n = sessions.length
            const avgScore = Math.round(sumScore / n)

            avgSubtitleEl.textContent = `총 ${n}회 학습 세션 평균 기준`
            avgScoreEl.innerHTML = `${avgScore}<span class="unit">점</span>`

            // ── 목록 렌더링 ──────────────────────────────────
            listEl.innerHTML = ''
            computed.forEach(c => {
                const btn = document.createElement('button')
                btn.className = 'session-item'
                btn.dataset.id = c.id
                btn.innerHTML = `
                    <div class="session-info">
                        <div class="session-name">${c.title}</div>
                        <div class="session-meta">${c.dateStr} · ${c.durMin}분 학습</div>
                    </div>
                    <div class="session-score-badge">${c.score}<span>점</span></div>`
                btn.addEventListener('click', () => toggleDetail(btn, c))
                listEl.appendChild(btn)
            })
        }

        // ── 상세 뷰 토글 ─────────────────────────────────────
        let activeBtn = null

        function toggleDetail(btn, c) {
            const emptyState = document.getElementById('emptyState')
            const detailView = document.getElementById('detailView')

            if (activeBtn === btn) {
                // 같은 항목 클릭 → 닫기
                btn.classList.remove('is-active')
                activeBtn = null
                detailView.classList.remove('is-visible')
                emptyState.style.display = 'flex'
                return
            }

            // 이전 활성 해제
            if (activeBtn) activeBtn.classList.remove('is-active')
            btn.classList.add('is-active')
            activeBtn = btn

            // 상세 데이터 채우기
            document.getElementById('detailDocName').textContent  = c.title
            document.getElementById('detailDocMeta').textContent  = `${c.dateStr} · ${c.durMin}분 학습`
            document.getElementById('detailScore').innerHTML      = `${c.score}<span class="unit">점</span>`
            document.getElementById('detailWarnRate').textContent  = `${c.warnRate}회`
            document.getElementById('detailReactTime').textContent = `${c.reactTime}초`
            document.getElementById('detailGazeRatio').textContent = `${c.gazeRatio}%`
            document.getElementById('detailSGaze').textContent    = `${c.sGaze}점`
            document.getElementById('detailSWarn').textContent    = `${c.sWarn}점`
            document.getElementById('detailSReact').textContent   = `${c.sReact}점`

            emptyState.style.display = 'none'
            detailView.classList.add('is-visible')
        }
    </script>
</body>

</html>
