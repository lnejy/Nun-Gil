    body {

  <script>
    const openSidebarButton = document.getElementById("openSidebarButton");
    const closeSidebarButton = document.getElementById("closeSidebarButton");
    const sidebar = document.getElementById("sidebar");
    const hero = document.querySelector(".hero");

    function animateHeroMove(changeLayout) {
      const first = hero.getBoundingClientRect();

      changeLayout();

      const last = hero.getBoundingClientRect();

      const dx = first.left - last.left;
      const dy = first.top - last.top;

      hero.style.transition = "none";
      hero.style.transform = `translate(${dx}px, ${dy}px)`;

      requestAnimationFrame(() => {
        hero.style.transition = "transform 0.48s cubic-bezier(0.22, 1, 0.36, 1)";
        hero.style.transform = "translate(0, 0)";
      });
    }

    function openSidebar() {
      animateHeroMove(() => {
        sidebar.classList.add("is-open");
        document.body.classList.add("sidebar-open");
      });
    }

    function closeSidebar() {
      animateHeroMove(() => {
        sidebar.classList.remove("is-open");
        document.body.classList.remove("sidebar-open");
      });
    }

    hero.addEventListener("transitionend", () => {
      hero.style.transition = "";
      hero.style.transform = "";
    });

    openSidebarButton.addEventListener("click", openSidebar);
    closeSidebarButton.addEventListener("click", closeSidebar);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeSidebar();
    });
  </script>

    import { createDocument } from '/src/lib/db/documents.js'
    import { getWorkspaces } from '/src/lib/db/workspaces.js'
    import { getRecentDocuments } from '/src/lib/db/documents.js'

    // ── 인증 가드 ────────────────────────────────────────
    const session = await requireAuth()
    if (!session) throw new Error('unauthenticated')
    const userId = session.user.id

    // ── 프로필 표시 ──────────────────────────────────────
    const user = await getCurrentUser()
    document.getElementById('profileName').textContent = user?.profile?.name ?? '사용자'

    // ── 사이드바: 워크스페이스 목록 ──────────────────────
    const workspaceSvg = `
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>
      </svg>`

    const docSvg = `
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <path d="M14 2v6h6"></path>
      </svg>`

    async function renderSidebar() {
      const wsList = document.getElementById('sidebarWorkspaceList')
      const recList = document.getElementById('sidebarRecentList')

      // 워크스페이스
      const workspaces = await getWorkspaces()
      if (workspaces.length === 0) {
        wsList.innerHTML = '<div style="padding:8px 10px;font-size:12px;color:#b0b8c4;">워크스페이스 없음</div>'
      } else {
        wsList.innerHTML = workspaces.slice(0, 5).map(ws => `
          <button class="workspace-item" data-ws-id="${ws.id}">
            <span class="sidebar-icon">${workspaceSvg}</span>
            <span class="workspace-content">
              <span class="sidebar-text">${ws.title}</span>
            </span>
          </button>`).join('')
        wsList.querySelectorAll('.workspace-item').forEach(el => {
          el.addEventListener('click', () => {
            location.href = `document.html?workspace_id=${el.dataset.wsId}`
          })
        })
      }

      // 최근 문서
      const recentDocs = await getRecentDocuments(5)
      if (recentDocs.length === 0) {
        recList.innerHTML = '<div style="padding:8px 10px;font-size:12px;color:#b0b8c4;">문서 없음</div>'
      } else {
        recList.innerHTML = recentDocs.map(doc => `
          <button class="recent-item" data-doc-id="${doc.id}">
            <span class="sidebar-icon">${docSvg}</span>
            <span class="recent-content">
              <span class="sidebar-text">${doc.file_name}</span>
            </span>
          </button>`).join('')
        recList.querySelectorAll('.recent-item').forEach(el => {
          el.addEventListener('click', () => {
            location.href = `viewer.html?doc_id=${el.dataset.docId}`
          })
        })
      }
    }

    // ── 홈 화면 파일 업로드 (빠른 업로드) ────────────────
    const fileInput = document.getElementById("fileUpload")
    const uploadTitle = document.querySelector(".upload-title")
    const uploadCard = document.querySelector(".upload-card")

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0]
      if (!file) return
      uploadTitle.textContent = '업로드 중...'
      try {
        const { storagePath, fileType } = await uploadDocument(file, userId)
        const doc = await createDocument({
          userId,
          workspaceId: null,   // 홈에서 업로드 → 워크스페이스 없음
          fileName: file.name,
          storagePath,
          fileType,
        })
        location.href = `processing.html?doc_id=${doc.id}`
      } catch (err) {
        alert('업로드 실패: ' + err.message)
        uploadTitle.textContent = '파일을 업로드해보세요'
      }
    })

    uploadCard.addEventListener("dragover", (e) => {
      e.preventDefault()
      uploadCard.style.borderColor = "#6fa3ef"
    })
    uploadCard.addEventListener("dragleave", () => {
      uploadCard.style.borderColor = "rgba(111, 163, 239, 0.12)"
    })
    uploadCard.addEventListener("drop", (e) => {
      e.preventDefault()
      uploadCard.style.borderColor = "rgba(111, 163, 239, 0.12)"
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files
        fileInput.dispatchEvent(new Event('change'))
      }
    })

    // ── "새 문서 추가" 버튼 → 사이드바 addButton ─────────
    document.querySelector('.sidebar-add-button').addEventListener('click', () => {
      fileInput.click()
    })

    // ── 초기화 ────────────────────────────────────────────
    renderSidebar()
  </script>
</body>

</html>
