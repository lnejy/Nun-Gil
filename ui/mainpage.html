<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>눈길 메인페이지</title>

  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body {
  min-height: 100vh;
  color: #1d2b4f;
  background:
    radial-gradient(ellipse 75% 55% at 10% 0%, #a8c8ff 0%, transparent 60%),
    radial-gradient(ellipse 65% 50% at 90% 0%, #93b8fa 0%, transparent 60%),
    #f8faff;
  overflow-x: hidden;

  display: flex;
  justify-content: center;
}

    .container {
  width: 100%;
  max-width: 1100px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 20px 40px;

  display: flex;
  flex-direction: column;
}

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 44px;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      font-weight: 450;
      color: #1e2d52;
      letter-spacing: -0.2px;
    }

    .logo span {
      font-size: 21px;
    }

    .nav-button {
      padding: 10px 18px;
      border: none;
      border-radius: 999px;
      background: #1f2f57;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(31, 47, 87, 0.14);
      transition: 0.2s ease;
    }

    .nav-button:hover {
      transform: translateY(-1px);
    }

    .hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding-top: 0;
  padding-bottom: 24px;
}

    .hero-badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(59, 130, 246, 0.14);
      color: #3562bd;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }

    .hero h1 {
      font-size: clamp(28px, 3vw, 36px);
      line-height: 1.3;
      letter-spacing: -1px;
      font-weight: 550;
      max-width: 900px;
      margin-bottom: 14px;
      color: #1b2745;
    }

    .hero h1 .highlight {
      color: #5b82e7;
      font-weight: 600;
    }

    .hero p {
      font-size: 16px;
      font-weight: 500;
      color: #7b8496;
      line-height: 1.6;
      margin-bottom: 5px;
    }


    .upload-card {
      width: 100%;
      max-width: 700px;
      min-height: 260px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(111, 163, 239, 0.12);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 14px 34px rgba(117, 154, 214, 0.05);
      backdrop-filter: blur(14px);
      transition: 0.25s ease;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      margin-top: 20px;
    }

    .upload-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(111, 163, 239, 0.1);
    }

    .upload-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      text-align: center;
    }

    .upload-icon {
      width: 49px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6fa3ef;
    }

    .upload-icon svg {
      width: 100%;
      height: 100%;
    }

    .upload-title {
      font-size: 18px;
      font-weight: 600;
      color: #22345e;
      letter-spacing: -0.3px;
      margin: 0 0 2px 0;
    }

    .upload-desc {
      max-width: 500px;
      font-size: 13px;
      color: #8b96ac;
      line-height: 1.7;
      font-weight: 400;
      margin: 0 0 6px 0;
    }

    .upload-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      height: 40px;
      padding: 0 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8bb5f6 0%, #73a2f0 100%);
      color: white;
      font-size: 15px;
      font-weight: 400;
      box-shadow: 0 10px 18px rgba(111, 163, 239, 0.18);
      margin-top: 4px;
    }

    .file-guide {
      font-size: 13px;
      color: #8090ad;
      font-weight: 400;
      margin: 0;
    }

    input[type="file"] {
      display: none;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .feature-chip {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(111, 163, 239, 0.12);
      border-radius: 999px;
      color: #49638f;
      font-size: 13px;
      font-weight: 400;
      box-shadow: 0 6px 16px rgba(126, 155, 205, 0.05);
    }

    /* ── 사이드바 ── */
    .menu-button {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .menu-icon {
      width: 24px;
      height: 18px;
      position: relative;
    }

    .menu-icon span {
      position: absolute;
      left: 0;
      height: 2px;
      border-radius: 999px;
      background: #7a7f89;
    }

    .menu-icon span:first-child {
      width: 18px;
      top: 2px;
    }

    .menu-icon span:last-child {
      width: 12px;
      top: 11px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.14);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 40;
    }

    .sidebar-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: #ffffff;
      border-right: 1px solid #eceef2;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.05);
      transform: translateX(-100%);
      transition: transform 0.24s ease;
      z-index: 50;
      display: flex;
      flex-direction: column;
    }

    .sidebar.is-open {
      transform: translateX(0);
    }

    .sidebar-header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #f1f3f5;
      flex-shrink: 0;
    }

    .sidebar-brand {
      font-size: 19px;
      font-weight: 600;
      color: #2f3440;
      letter-spacing: -0.3px;
    }

    .sidebar-close {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #8a9099;
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
    }

    .sidebar-close:hover {
      background: #f5f6f8;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 14px;
    }

    .sidebar-group {
      margin-bottom: 35px;
    }

    .sidebar-divider {
      height: 1px;
      background: #f0f2f5;
      margin: 16px 8px;
    }

    .sidebar-add-button {
  width: calc(100% - 8px);
  height: 44px;
  margin: 0 auto;
  border: none;
  background: linear-gradient(180deg, #8bb5f6 0%, #73a2f0 100%);
  color: #ffffff;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 10px 20px rgba(120, 163, 234, 0.24);
}

.sidebar-add-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 22px rgba(120, 163, 234, 0.3);
}

.sidebar-add-plus {
  font-size: 17px;
  font-weight: 500;
  line-height: 1;
  position: relative;
  top: -1px;
}

.sidebar-add-button:active {
  transform: translateY(0);
  box-shadow: 0 6px 12px rgba(120, 163, 234, 0.2);
}

    .sidebar-section-label {
      margin: 0 8px 10px;
      font-size: 13px;
      font-weight: 400;
      color: #a0a6b0;
      letter-spacing: -0.1px;
      text-transform: none;
    }

    .sidebar-menu-list,
    .workspace-list,
    .recent-list,
    .bottom-menu-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-menu-item,
    .workspace-item,
    .recent-item,
    .bottom-menu-item {
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: none;
      background: transparent;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
      color: #4b525d;
      transition: background 0.18s ease;
    }

    .sidebar-menu-item:hover,
    .workspace-item:hover,
    .recent-item:hover,
    .bottom-menu-item:hover {
      background: #f5f6f8;
    }

    .sidebar-menu-item.is-active {
      background: #f1f3f5;
      color: #2f3440;
    }

    .sidebar-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a3a9b3;
      flex-shrink: 0;
    }

    .sidebar-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .workspace-content,
    .recent-content {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .sidebar-text {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 350;
      line-height: 1.35;
      letter-spacing: -0.2px;
      color: #4b525d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace-meta,
    .recent-meta {
      font-size: 12px;
      color: #9aa1ab;
      margin-top: 2px;
      line-height: 1.3;
    }

    .workspace-item,
    .recent-item {
      align-items: center;
    }

    .sidebar-profile {
      padding: 14px;
      border-top: 1px solid #f1f3f5;
      background: #fcfcfd;
      flex-shrink: 0;
    }

    .sidebar-profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #eef0f3;
      background: #ffffff;
      border-radius: 14px;
    }

    .sidebar-profile-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #eceef2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a2a8b1;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-profile-avatar svg {
      width: 30px;
      height: 30px;
      display: block;
    }

    .sidebar-profile-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .sidebar-profile-name {
      font-size: 14px;
      font-weight: 600;
      color: #313641;
      letter-spacing: -0.2px;
    }

    .sidebar-profile-email {
      font-size: 12px;
      color: #99a0aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 900px) {
      .navbar {
        margin-bottom: 36px;
      }

      .hero h1 {
        font-size: clamp(26px, 7vw, 40px);
      }

      .hero p {
        font-size: 14px;
      }

      .upload-card {
        min-height: 280px;
        padding: 24px 18px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 18px 14px 32px;
      }

      .logo {
        font-size: 18px;
      }

      .logo span {
        font-size: 22px;
      }

      .nav-button {
        padding: 9px 14px;
        font-size: 12px;
      }

      .hero-badge {
        font-size: 11px;
        padding: 6px 10px;
      }

      .hero h1 {
        font-size: 26px;
        margin-bottom: 12px;
      }

      .hero p {
        font-size: 14px;
        margin-bottom: 22px;
      }

      .upload-card {
        min-height: 250px;
        padding: 22px 16px;
      }

      .upload-title {
        font-size: 17px;
      }

      .upload-desc {
        font-size: 13px;
      }

      .upload-button {
        font-size: 13px;
      }

      .feature-chip {
        font-size: 12px;
        padding: 9px 12px;
      }

      .sidebar {
        width: 84vw;
        max-width: 290px;
      }
    }
  </style>
</head>
<body>
  <!-- 사이드바 오버레이 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">👀</div>
      <button class="sidebar-close" id="closeSidebarButton" aria-label="사이드바 닫기">×</button>
    </div>

    <div class="sidebar-scroll">
      <section class="sidebar-group">
        <button class="sidebar-add-button">
          <span class="sidebar-add-plus">+</span>

      </section>

      <section class="sidebar-group">
        <div class="sidebar-menu-list">
          <button class="sidebar-menu-item is-active" onclick="location.href='workspace.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 10.5L12 3l9 7.5"></path>
                <path d="M5 9.5V20h14V9.5"></path>
              </svg>
            </span>

      <section class="sidebar-group">
        <div class="sidebar-section-label">최근 워크스페이스</div>
        <div class="workspace-list">
          <button class="workspace-item" onclick="location.href='document.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>

            </span>

            </span>
          </button>

          <button class="workspace-item" onclick="location.href='document.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>
              </svg>
            </span>
            <span class="workspace-content">
              <span class="sidebar-text">운영체제 워크스페이스</span>

          </button>

          <button class="workspace-item" onclick="location.href='document.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>
              </svg>
            </span>

              <span class="sidebar-text">데이터통신 워크스페이스</span>

      <section class="sidebar-group">
        <div class="sidebar-section-label">최근 문서</div>
        <div class="recent-list">
          <button class="recent-item" onclick="location.href='viewer.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <path d="M14 2v6h6"></path>
              </svg>
            </span>
            <span class="recent-content">
              <span class="sidebar-text">03_16 캡스톤 회의록.pdf</span>

          <button class="recent-item" onclick="location.href='viewer.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <path d="M14 2v6h6"></path>
              </svg>
            </span>
            <span class="recent-content">
              <span class="sidebar-text">기말 발표 자료.pptx</span>
            </span>
          </button>

          <button class="recent-item" onclick="location.href='viewer.html'">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <path d="M14 2v6h6"></path>
              </svg>

      <section class="sidebar-group">
        <div class="bottom-menu-list">

    </div>

    <div class="sidebar-profile">
      <div class="sidebar-profile-card">
        <div class="sidebar-profile-avatar" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="32" fill="currentColor" opacity="0.14"/>
            <circle cx="32" cy="24" r="10" fill="currentColor"/>
            <path d="M18 46C18 38.268 24.268 32 32 32C39.732 32 46 38.268 46 46V48H18V46Z" fill="currentColor"/>
          </svg>

          <div class="sidebar-profile-name">신영서</div>

  </aside>

  <!-- 메인 콘텐츠 -->
  <div class="container">
    <header class="navbar">
      <div class="navbar-left">
        <button class="menu-button" id="openSidebarButton" aria-label="사이드바 열기">
          <div class="menu-icon">
            <span></span>
            <span></span>
          </div>
        </button>
        <div class="logo">NunGil</div>
      </div>
    </header>

    <main class="hero">
      <div class="hero-badge">AI 기반 학습 보조 도구</div>

      <p>문서를 업로드하면</p>
      <h1>
        <span class="highlight">눈길</span>이 학습에 <span class="highlight">집중</span>할 수 있도록 도와드릴게요 :)
      </h1>

      <div class="upload-card">
        <label for="fileUpload" class="upload-inner">
          <div class="upload-icon">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 44V14" stroke="currentColor" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M21 25L32 14L43 25" stroke="currentColor" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M13 39V46C13 51.5228 17.4772 56 23 56H41C46.5228 56 51 51.5228 51 46V39" stroke="currentColor" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>
          <div class="upload-title">파일을 업로드해보세요</div>
          <div class="upload-button">파일 선택하기</div>
          <div class="upload-desc">
            PDF, PPT 파일을 드래그해서 올리거나 버튼을 눌러 문서를 선택할 수 있어요.
          </div>

        </label>
        <input type="file" id="fileUpload" />
      </div>
    </main>
  </div>

  <script>
    /* ── 파일 업로드 ── */
    const fileInput = document.getElementById("fileUpload");
    const uploadTitle = document.querySelector(".upload-title");
    const uploadCard = document.querySelector(".upload-card");

    fileInput.addEventListener("change", function () {
      if (fileInput.files.length > 0) {
        uploadTitle.textContent = fileInput.files[0].name;
        setTimeout(() => { location.href = 'sidebar.html'; }, 600);
      }
    });

    uploadCard.addEventListener("dragover", function (e) {
      e.preventDefault();
      uploadCard.style.borderColor = "#6fa3ef";
    });

    uploadCard.addEventListener("dragleave", function () {
      uploadCard.style.borderColor = "rgba(111, 163, 239, 0.12)";
    });

    uploadCard.addEventListener("drop", function (e) {
      e.preventDefault();
      uploadCard.style.borderColor = "rgba(111, 163, 239, 0.12)";

      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        uploadTitle.textContent = e.dataTransfer.files[0].name;
      }
    });

    /* ── 사이드바 ── */
    const openSidebarButton = document.getElementById("openSidebarButton");
    const closeSidebarButton = document.getElementById("closeSidebarButton");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const sidebar = document.getElementById("sidebar");

    function openSidebar() {
      sidebar.classList.add("is-open");
      sidebarOverlay.classList.add("is-open");
    }

    function closeSidebar() {
      sidebar.classList.remove("is-open");
      sidebarOverlay.classList.remove("is-open");
    }

    openSidebarButton.addEventListener("click", openSidebar);
    closeSidebarButton.addEventListener("click", closeSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeSidebar();
    });
  </script>
</body>
</html>
