<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 설정 - 눈길</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --p: #78a3ea;
            --outer-bg: #f6f7f9;
            --inner-bg: rgba(255, 255, 255, 0.6);
            --card-bg: #ffffff;
            --text-dark: #2f3440;
            --text-gray: #a0a6b0;
            --border: #eceef2;
            --success: #4caf50;
            --tr: .3s cubic-bezier(.4, 0, .2, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: radial-gradient(ellipse 75% 55% at 10% 0%, rgba(168, 200, 255, 0.4) 0%, transparent 60%),
                    radial-gradient(ellipse 65% 50% at 90% 0%, rgba(147, 184, 250, 0.3) 0%, transparent 60%),
                    #fbfcfd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-wrapper {
            width: 95vw;
            max-width: 700px;
            height: 90vh;
            background-color: var(--inner-bg);
            backdrop-filter: blur(30px) saturate(150%);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .panel {
            flex: 1;
            padding: 50px 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--text-gray);
            margin-bottom: 30px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-dark);
            transform: translateX(-3px);
        }

        .profile-summary {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, #78a3ea, #a78bfa);
        }

        .profile-info p { margin: 0; }
        .user-name-small { font-weight: 700; font-size: 16px; }
        .user-meta-small { color: var(--text-gray); font-size: 12px; }

        .section-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0 0 30px 0;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-gray);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-container { position: relative; }
        .input-container input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border);
            background: #fafbfc;
            border-radius: 15px;
            font-size: 15px;
            transition: var(--tr);
            outline: none;
            font-family: inherit;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0 28px;
        }

        .section-sub {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 20px 0;
        }

        .btn-save {
            background: var(--p);
            color: white;
            padding: 16px 35px;
            border-radius: 15px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(120, 163, 234, 0.2);
            transition: var(--tr);
            font-size: 15px;
            font-family: inherit;
            width: fit-content;
            margin-top: 8px;
        }

        .btn-save:hover { transform: translateY(-2px); opacity: 0.9; }

        .edit-mode input:not([disabled]) {
            background: #fff !important;
            border-color: var(--p) !important;
            box-shadow: 0 0 0 4px rgba(120, 163, 234, 0.1);
        }

        .save-msg {
            display: none;
            font-size: 13px;
            color: #4caf50;
            font-weight: 600;
            margin-top: 12px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>

<body>
    <div class="app-wrapper">
        <div class="panel" id="section-profile">
            <button class="back-btn" onclick="history.back()" title="뒤로가기">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <div class="profile-summary">
                <div class="profile-img" id="profileAvatar"></div>
                <div class="profile-info">
                    <p class="user-name-small" id="profileNameSmall">—</p>
                    <p class="user-meta-small" id="profileEmailSmall">—</p>
                </div>
            </div>

            <h1 class="section-title">계정 설정</h1>

            <div class="form-group">
                <label>Display Name</label>
                <div class="input-container">
                    <input type="text" id="input-name" value="" readonly>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-container">
                    <input type="email" id="input-email" value="" disabled>
                    <span style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--p); font-weight: 600;">
                        <i class="fa-solid fa-circle-check"></i> Verified
                    </span>
                </div>
            </div>

            <div class="divider"></div>

            <h2 class="section-sub">Security Settings</h2>

            <div class="form-group" id="pw-status-row">
                <label>Password Status</label>
                <div class="input-container">
                    <input type="password" value="********" disabled>
                </div>
            </div>

            <div id="password-change-fields" style="display: none; margin-bottom: 28px;">
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label style="display:block;font-size:14px;color:var(--text-gray);font-weight:600;margin-bottom:10px;">New Password</label>
                        <input type="password" id="new-pw" placeholder="새 비밀번호" style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--border);font-size:14px;font-family:inherit;outline:none;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display:block;font-size:14px;color:var(--text-gray);font-weight:600;margin-bottom:10px;">Confirm</label>
                        <input type="password" id="confirm-pw" placeholder="비밀번호 확인" style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--border);font-size:14px;font-family:inherit;outline:none;">
                    </div>
                </div>
            </div>

            <button id="main-action-btn" class="btn-save">프로필 수정하기</button>
            <p class="save-msg" id="saveMsg">✓ 저장되었습니다.</p>
        </div>
    </div>

    <script type="module">
        import { requireAuth } from '/src/lib/auth.js'
        import { sb }         from '/src/lib/supabase.js'

        const session = await requireAuth()
        if (!session) throw new Error('unauthenticated')
        const user = session.user

        const { data: profile } = await sb
            .from('users')
            .select('name')
            .eq('id', user.id)
            .single()

        const name  = profile?.name ?? user.email.split('@')[0]
        const email = user.email

        document.getElementById('input-name').value    = name
        document.getElementById('input-email').value   = email
        document.getElementById('profileNameSmall').textContent  = name
        document.getElementById('profileEmailSmall').textContent = email

        const avatar = document.getElementById('profileAvatar')
        avatar.textContent = name.charAt(0).toUpperCase()

        let isEditMode = false
        const btn       = document.getElementById('main-action-btn')
        const nameInput = document.getElementById('input-name')
        const pwFields  = document.getElementById('password-change-fields')
        const pwStatus  = document.getElementById('pw-status-row')
        const section   = document.getElementById('section-profile')
        const saveMsg   = document.getElementById('saveMsg')

        btn.addEventListener('click', async () => {
            if (!isEditMode) {
                isEditMode = true
                section.classList.add('edit-mode')
                nameInput.readOnly = false
                nameInput.focus()
                pwStatus.style.display = 'none'
                pwFields.style.display = 'block'
                btn.textContent = '변경사항 저장하기'
                btn.style.background = '#333'
            } else {
                const newName   = nameInput.value.trim()
                const newPw     = document.getElementById('new-pw').value
                const confirmPw = document.getElementById('confirm-pw').value

                try {
                    if (newName) {
                        await sb.from('users').update({ name: newName }).eq('id', user.id)
                    }
                    if (newPw) {
                        if (newPw !== confirmPw) { alert('비밀번호가 일치하지 않아요.'); return }
                        await sb.auth.updateUser({ password: newPw })
                    }

                    document.getElementById('profileNameSmall').textContent = newName || name
                    avatar.textContent = (newName || name).charAt(0).toUpperCase()

                    isEditMode = false
                    section.classList.remove('edit-mode')
                    nameInput.readOnly = true
                    pwFields.style.display = 'none'
                    document.getElementById('new-pw').value     = ''
                    document.getElementById('confirm-pw').value = ''
                    pwStatus.style.display = 'block'
                    btn.textContent = '프로필 수정하기'
                    btn.style.background = 'var(--p)'

                    saveMsg.style.display = 'block'
                    setTimeout(() => { saveMsg.style.display = 'none' }, 3000)
                } catch (e) {
                    alert('저장 실패: ' + e.message)
                }
            }
        })
    </script>
</body>

</html>
