<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>눈길 메인페이지</title>

  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body {
  min-height: 100vh;
  color: #1d2b4f;
  background:
    radial-gradient(ellipse 75% 55% at 10% 0%, #a8c8ff 0%, transparent 60%),
    radial-gradient(ellipse 65% 50% at 90% 0%, #93b8fa 0%, transparent 60%),
    #f8faff;
  overflow-x: hidden;

  display: flex;
  justify-content: center;
}

    .container {
  width: 100%;
  max-width: 1100px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 20px 40px;

  display: flex;
  flex-direction: column;
}

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 44px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      font-weight: 450;
      color: #1e2d52;
      letter-spacing: -0.2px;
    }

    .logo span {
      font-size: 21px;
    }

    .nav-button {
      padding: 10px 18px;
      border: none;
      border-radius: 999px;
      background: #1f2f57;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(31, 47, 87, 0.14);
      transition: 0.2s ease;
    }

    .nav-button:hover {
      transform: translateY(-1px);
    }

    .hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding-top: 0;
  padding-bottom: 24px;
}

    .hero-badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(59, 130, 246, 0.14);
      color: #3562bd;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }

    .hero h1 {
      font-size: clamp(28px, 3vw, 36px);
      line-height: 1.3;
      letter-spacing: -1px;
      font-weight: 550;
      max-width: 900px;
      margin-bottom: 14px;
      color: #1b2745;
    }

    .hero h1 .highlight {
      color: #5b82e7;
      font-weight: 600;
    }

    .hero p {
      font-size: 16px;
      font-weight: 500;
      color: #7b8496;
      line-height: 1.6;
      margin-bottom: 5px;
    }

   
    .upload-card {
      width: 100%;
      max-width: 700px;
      min-height: 260px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(111, 163, 239, 0.12);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 14px 34px rgba(117, 154, 214, 0.05);
      backdrop-filter: blur(14px);
      transition: 0.25s ease;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      margin-top: 20px;
    }

    .upload-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(111, 163, 239, 0.1);
    }

    .upload-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      text-align: center;
    }

    .upload-icon {
      width: 49px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6fa3ef;
    }

    .upload-icon svg {
      width: 100%;
      height: 100%;
    }

    .upload-title {
      font-size: 18px;
      font-weight: 600;
      color: #22345e;
      letter-spacing: -0.3px;
      margin: 0 0 2px 0;
    }

    .upload-desc {
      max-width: 500px;
      font-size: 13px;
      color: #8b96ac;
      line-height: 1.7;
      font-weight: 400;
      margin: 0 0 6px 0;
    }

    .upload-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      height: 40px;
      padding: 0 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8bb5f6 0%, #73a2f0 100%);
      color: white;
      font-size: 15px;
      font-weight: 400;
      box-shadow: 0 10px 18px rgba(111, 163, 239, 0.18);
      margin-top: 4px;
    }

    .file-guide {
      font-size: 13px;
      color: #8090ad;
      font-weight: 400;
      margin: 0;
    }

    input[type="file"] {
      display: none;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .feature-chip {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(111, 163, 239, 0.12);
      border-radius: 999px;
      color: #49638f;
      font-size: 13px;
      font-weight: 400;
      box-shadow: 0 6px 16px rgba(126, 155, 205, 0.05);
    }

    @media (max-width: 900px) {
      .navbar {
        margin-bottom: 36px;
      }

      .hero h1 {
        font-size: clamp(26px, 7vw, 40px);
      }

      .hero p {
        font-size: 14px;
      }

      .upload-card {
        min-height: 280px;
        padding: 24px 18px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 18px 14px 32px;
      }

      .logo {
        font-size: 18px;
      }

      .logo span {
        font-size: 22px;
      }

      .nav-button {
        padding: 9px 14px;
        font-size: 12px;
      }

      .hero-badge {
        font-size: 11px;
        padding: 6px 10px;
      }

      .hero h1 {
        font-size: 26px;
        margin-bottom: 12px;
      }

      .hero p {
        font-size: 14px;
        margin-bottom: 22px;
      }

      .upload-card {
        min-height: 250px;
        padding: 22px 16px;
      }

      .upload-title {
        font-size: 17px;
      }

      .upload-desc {
        font-size: 13px;
      }

      .upload-button {
        font-size: 13px;
      }

      .feature-chip {
        font-size: 12px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="navbar">
      <div class="logo">NunGil</div>
      <!-- <button class="nav-button">시작하기</button> -->
    </header>

    <main class="hero">
      <div class="hero-badge">AI 기반 학습 보조 도구</div>

      <p>문서를 업로드하면</p>
      <h1>
        <span class="highlight">눈길</span>이 학습에 <span class="highlight">집중</span>할 수 있도록 도와드릴게요 :)
      </h1>

      <div class="upload-card">
        <label for="fileUpload" class="upload-inner">
          <div class="upload-icon">
  <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 44V14" stroke="currentColor" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M21 25L32 14L43 25" stroke="currentColor" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M13 39V46C13 51.5228 17.4772 56 23 56H41C46.5228 56 51 51.5228 51 46V39" stroke="currentColor" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>
          <div class="upload-title">파일을 업로드해보세요</div>
          <div class="upload-button">파일 선택하기</div>
          <div class="upload-desc">
            PDF, PPT 파일을 드래그해서 올리거나 버튼을 눌러 문서를 선택할 수 있어요.
          </div>
          
        </label>
        <input type="file" id="fileUpload" />
      </div>
    </main>
  </div>

  <script>
    const fileInput = document.getElementById("fileUpload");
    const uploadTitle = document.querySelector(".upload-title");
    const uploadCard = document.querySelector(".upload-card");

    fileInput.addEventListener("change", function () {
      if (fileInput.files.length > 0) {
        uploadTitle.textContent = fileInput.files[0].name;
      }
    });

    uploadCard.addEventListener("dragover", function (e) {
      e.preventDefault();
      uploadCard.style.borderColor = "#6fa3ef";
    });

    uploadCard.addEventListener("dragleave", function () {
      uploadCard.style.borderColor = "rgba(111, 163, 239, 0.12)";
    });

    uploadCard.addEventListener("drop", function (e) {
      e.preventDefault();
      uploadCard.style.borderColor = "rgba(111, 163, 239, 0.12)";

      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        uploadTitle.textContent = e.dataTransfer.files[0].name;
      }
    });
  </script>
</body>
</html>
