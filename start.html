<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>눈길 - 시작 페이지</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --p: #6fa3ef;
      --pd: #5a8fde;
      --bg: #f8faff;
      --tx: #0f172a;
      --sub: #475569;
      --tr: .18s cubic-bezier(.4,0,.2,1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--tx);
      overflow-x: hidden;
    }

    .page-wrap {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 75% 55% at 10% 0%, #a8c8ff 0%, transparent 60%),
        radial-gradient(ellipse 65% 50% at 90% 0%, #93b8fa 0%, transparent 60%),
        #f8faff;
    }

    .hero-logo {
      position: absolute;
      top: 28px;
      left: 36px;
      font-size: 15px;
      font-weight: 600;
      color: #1e3a8a;
      z-index: 5;
    }

    .main-content {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform .42s cubic-bezier(.4,0,.2,1), opacity .42s ease;
      position: relative;
      z-index: 5;
    }

    .main-content.shift-left {
      transform: translateX(-190px);
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(59,130,246,.22);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 500;
      color: #1e40af;
      margin-bottom: 28px;
    }

    .hero-title {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1.2;
      color: #0f172a;
      margin-bottom: 25px;
    }

    .hero-desc {
      font-size: clamp(10px, 1.4vw, 14px);
      line-height: 1.85;
      color: #727171;
      margin-bottom: 50px;
      max-width: 480px;
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-blue {
      background: linear-gradient(180deg, #8bb5f6 0%, #73a2f0 100%);
      color: #fff;
      border: none;
      padding: 13px 26px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--tr), transform var(--tr), box-shadow var(--tr);
    }

    .btn-blue:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(120, 163, 234, 0.3);
    }

    /* .btn-glass {
      background: rgba(255,255,255,.65);
      color: #1e3a8a;
      border: 1px solid rgba(59,130,246,.22);
      backdrop-filter: blur(8px);
      padding: 13px 26px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--tr), transform var(--tr), box-shadow var(--tr);
    }

    .btn-glass:hover {
      background: rgba(255,255,255,.9);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    } */

    .signup-link {
      margin-top: 14px;
      font-size: 13px;
      color: #94a3b8;
      text-decoration: underline;
      text-underline-offset: 3px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: center;
      transition: color var(--tr);
    }

    .signup-link:hover {
      color: #64748b;
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      font-size: 11px;
      animation: bob 2s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(6px);
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(78, 101, 148, 0.10);
      backdrop-filter: blur(5px);
      opacity: 0;
      visibility: hidden;
      transition: .3s ease;
      z-index: 20;
    }

    .overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .login-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(560px, 88vw);
      height: 100vh;
      background: rgba(245, 249, 255, 0.45);
      backdrop-filter: blur(10px);
      box-shadow: -20px 0 48px rgba(80, 112, 176, 0.10);
      transform: translateX(100%);
      transition: transform .42s cubic-bezier(.4,0,.2,1);
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .login-panel.show {
      transform: translateX(0);
    }

    .login-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(560px, 88vw);   /* 기존보다 줄임 */
  height: 100vh;
  background: rgba(245, 249, 255, 0.45);
  backdrop-filter: blur(10px);
  box-shadow: -20px 0 48px rgba(80, 112, 176, 0.10);
  transform: translateX(100%);
  transition: transform .42s cubic-bezier(.4,0,.2,1);
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-panel.show {
  transform: translateX(0);
}

.login-card {
  width: 100%;
  max-width: 430px;   /* 기존 640px 정도였다면 확 줄임 */
  background: rgba(255, 255, 255, 0.97);
  border-radius: 26px;
  padding: 28px 26px 24px;
  box-shadow: 0 18px 45px rgba(74, 102, 155, 0.12);
  border: 1px solid rgba(216, 228, 248, 0.9);
  text-align: left;
}

.login-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 18px;
}

.login-title-wrap h2 {
  font-size: 30px;
  line-height: 1.08;
  color: #0f172a;
  margin-bottom: 8px;
  letter-spacing: -0.04em;
  font-weight: 600;
}

.login-title-wrap p {
  font-size: 13px;
  color: #8a94a6;
  line-height: 1.5;
  margin-bottom: 10px;
}

.close-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: #edf4ff;
  color: #6b7ea6;
  font-size: 22px;
  cursor: pointer;
  transition: var(--tr);
  flex-shrink: 0;
}

.close-btn:hover {
  background: #e3efff;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #334155;
  margin-bottom: 7px;
}

.form-input {
  width: 100%;
  height: 50px;
  border: 1px solid #d8e4f8;
  border-radius: 14px;
  padding: 0 16px;
  font-size: 14px;
  color: #0f172a;
  outline: none;
  background: #fff;
  transition: var(--tr);
}

.form-input::placeholder {
  color: #8b8b8b;
}

.form-input:focus {
  border-color: #7aa7f1;
  box-shadow: 0 0 0 4px rgba(122, 167, 241, 0.12);
}

.login-btn {
  width: 100%;
  height: 52px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(180deg, #8bb5f6 0%, #73a2f0 100%);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(115, 162, 240, 0.2);
  margin-top: 4px;
  transition: var(--tr);
}

.login-btn:hover {
  transform: translateY(-1px);
}

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0;
  color: #94a3b8;
  font-size: 12px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #dde7f5;
}

.google-btn {
  width: 100%;
  height: 52px;
  border-radius: 14px;
  border: 1px solid #d8e4f8;
  background: #fff;
  color: #334155;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: var(--tr);
}

.google-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(100, 130, 190, 0.1);
}

.login-bottom {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: #8a94a6;
}

.login-bottom a {
  color: #73a2f0;
  text-decoration: none;
  font-weight: 700;
}

    @media (max-width: 900px) {
      .main-content.shift-left {
        transform: translateX(-90px);
      }

      .login-panel {
        width: min(620px, 95vw);
        padding: 24px;
      }

      .login-card {
        max-width: 100%;
        padding: 34px 28px 28px;
        border-radius: 28px;
      }

      .login-title-wrap h2 {
        font-size: 18px;
      }

      .login-title-wrap p {
        font-size: 15px;
      }

      .close-btn {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        font-size: 15px;
        margin-bottom: 8px;
      }

      .form-input {
        height: 60px;
        font-size: 17px;
        border-radius: 16px;
        padding: 0 18px;
      }

      .login-btn,
      .google-btn {
        height: 62px;
        font-size: 18px;
        border-radius: 16px;
      }

      .divider {
        font-size: 14px;
        margin: 18px 0;
      }

      .login-bottom {
        margin-top: 18px;
        font-size: 14px;
      }
    }

    @media (max-width: 640px) {
      .hero {
        padding: 90px 20px 70px;
      }

      .hero-logo {
        left: 20px;
        top: 22px;
      }

      .hero-btns {
        flex-direction: column;
        width: 100%;
        max-width: 280px;
      }

      .btn-blue {
        width: 100%;
      }

      .main-content.shift-left {
        transform: translateX(-35px);
      }

      .login-panel {
        width: 100vw;
        padding: 16px;
      }

      .login-card {
        padding: 24px 18px 20px;
        border-radius: 22px;
      }

      .login-head {
        margin-bottom: 20px;
      }

      .login-title-wrap h2 {
        font-size: 34px;
      }

      .login-title-wrap p {
        font-size: 13px;
      }

      .close-btn {
        width: 42px;
        height: 42px;
        font-size: 20px;
      }

      .form-input {
        height: 54px;
        font-size: 15px;
      }

      .login-btn,
      .google-btn {
        height: 56px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <section class="hero">
      <div class="hero-logo">눈길</div>

      <div class="main-content" id="mainContent">
        <div class="hero-pill">👀 지능형 학습 보조 서비스 →</div>

        <h1 class="hero-title">
          당신의 시선이 머무는 곳,<br>
          눈길
        </h1>

        <p class="hero-desc">
          문서를 읽는 동안 당신의 집중도를 분석하고,<br>
          필요한 학습 자료를 생성, 지원하여 효율적인 학습을 돕습니다.
        </p>

        <div class="hero-btns">
          <button class="btn-blue" id="openLoginBtn">기존 계정으로 로그인 →</button>
        </div>

        <button class="signup-link">회원가입</button>

        <!-- <div class="scroll-hint">
          <span style="font-size:18px">↓</span>
          <span>스크롤해서 더 보기</span>
        </div> -->
      </div>
    </section>

    <div class="overlay" id="overlay"></div>

    <aside class="login-panel" id="loginPanel">
      <div class="login-card">
        <div class="login-head">
          <div class="login-title-wrap">
            <h2>로그인</h2>
            <p>아이디 또는 구글 계정으로 로그인해 주세요.</p>
          </div>
          <button class="close-btn" id="closeLoginBtn" aria-label="닫기">×</button>
        </div>

        <form>
          <div class="form-group">
            <label for="loginId">아이디</label>
            <input
              type="text"
              id="loginId"
              class="form-input"
              placeholder="아이디를 입력하세요"
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">비밀번호</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
            />
          </div>

          <button type="submit" class="login-btn">로그인</button>

          <div class="divider">또는</div>

          <button type="button" class="google-btn" id="googleLoginBtn">
            <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.1 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.2-3.4 5.8-6.4 7.3l6.2 5.2C38.7 37.2 44 31.2 44 24c0-1.2-.1-2.3-.4-3.5z"/>
            </svg>
            Google 계정으로 로그인
          </button>
        </form>

        <div class="login-bottom">
          아직 계정이 없으신가요? <a href="#">회원가입</a>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const openLoginBtn = document.getElementById("openLoginBtn");
    const closeLoginBtn = document.getElementById("closeLoginBtn");
    const overlay = document.getElementById("overlay");
    const loginPanel = document.getElementById("loginPanel");
    const mainContent = document.getElementById("mainContent");
    const googleLoginBtn = document.getElementById("googleLoginBtn");

    function openLoginPanel() {
      loginPanel.classList.add("show");
      overlay.classList.add("show");
      mainContent.classList.add("shift-left");
    }

    function closeLoginPanel() {
      loginPanel.classList.remove("show");
      overlay.classList.remove("show");
      mainContent.classList.remove("shift-left");
    }

    openLoginBtn.addEventListener("click", openLoginPanel);
    closeLoginBtn.addEventListener("click", closeLoginPanel);
    overlay.addEventListener("click", closeLoginPanel);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeLoginPanel();
      }
    });

    googleLoginBtn.addEventListener("click", function () {
      alert("구글 로그인은 나중에 Supabase 또는 Firebase와 연결하면 돼요.");
    });
  </script>

</body>
</html>
