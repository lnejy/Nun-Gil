<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>눈길</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ═══ PAGE: HOME ═══ -->
  <div id="page-home" class="page active">
    <div class="layout">
      <aside class="app-sidebar">
        <div class="logo" onclick="goHome()">눈길</div>
        <div class="nav-item active" onclick="goHome()">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 21V12h6v9"/></svg></span>홈
        </div>
        <div class="nav-item" onclick="goFiles()">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>전체 파일
        </div>
        <div class="nav-item">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>즐겨찾기
        </div>
      </aside>
      <main class="home-main">
        <h2>안녕하세요, 유진님</h2>
        <div class="drop-zone" onclick="document.getElementById('hfi').click()">
          <div class="dz-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></div>
          <div class="dz-t">새로운 문서를 분석해볼까요?</div>
          <div class="dz-s">PDF, JPG, PNG 파일을 클릭 또는 드래그하세요</div>
          <input type="file" id="hfi" style="display:none;" onchange="goViewer()">
        </div>
        <div class="sec-lbl">최근 작업</div>
        <div class="proj-grid">
          <div class="proj-card" onclick="goViewer()">
            <div class="c-thumb"><div class="c-ico" style="background:#dbeafe;"><svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg></div></div>
            <div class="c-info"><span class="c-name">03/16 캡스톤 디자인 회의</span><span class="c-date">2시간 전</span></div>
          </div>
          <div class="proj-card" onclick="goViewer()">
            <div class="c-thumb" style="background:#f0fdf4;"><div class="c-ico" style="background:#dcfce7;"><svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg></div></div>
            <div class="c-info"><span class="c-name">운영체제 7강 요약본</span><span class="c-date">어제</span></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ═══ PAGE: FILES ═══ -->
  <div id="page-files" class="page">
    <div class="layout">
      <aside class="app-sidebar">
        <div class="logo" onclick="goHome()">눈길</div>
        <div class="nav-item" onclick="goHome()"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 21V12h6v9"/></svg></span>홈</div>
        <div class="nav-item active" onclick="goFiles()"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>전체 파일</div>
        <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>즐겨찾기</div>
      </aside>
      <main class="files-main">
        <h2 id="filesTitle" onclick="showFolderLv()">내 프로젝트</h2>
        <div id="folderGrid" class="f-grid">
          <div class="f-card add" onclick="document.getElementById('ffi').click()">
            <div class="f-ico" style="background:var(--primary-light);"><svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
            <span class="f-nm">새 파일 분석</span>
            <input type="file" id="ffi" style="display:none;" onchange="goViewer()">
          </div>
          <div class="f-card" onclick="openFolder('운영체제')">
            <div class="f-ico" style="background:#fef9c3;"><svg viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
            <span class="f-nm">운영체제</span><span class="f-sb">파일 3개</span>
          </div>
          <div class="f-card" onclick="openFolder('컴퓨터네트워크')">
            <div class="f-ico" style="background:#fef9c3;"><svg viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
            <span class="f-nm">컴퓨터네트워크</span><span class="f-sb">파일 0개</span>
          </div>
          <div class="f-card" onclick="openFolder('캡스톤디자인')">
            <div class="f-ico" style="background:#fef9c3;"><svg viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
            <span class="f-nm">캡스톤디자인</span><span class="f-sb">파일 2개</span>
          </div>
        </div>
        <div id="fileGrid" class="f-grid" style="display:none;">
          <div class="f-card add" onclick="document.getElementById('ffi2').click()">
            <div class="f-ico" style="background:var(--primary-light);"><svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
            <span class="f-nm">이 폴더에 추가</span>
            <input type="file" id="ffi2" style="display:none;" onchange="goViewer()">
          </div>
          <div class="f-card" onclick="goViewer()">
            <div class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="f-nm">운영체제 7강 요약</span><span class="f-sb">방금 전</span>
          </div>
          <div class="f-card" onclick="goViewer()">
            <div class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="f-nm">운영체제 8강 요약</span><span class="f-sb">어제</span>
          </div>
          <div class="f-card" onclick="goViewer()">
            <div class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="f-nm">중간고사 정리</span><span class="f-sb">3일 전</span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
  /* ── 페이지 전환 ── */
  function goHome() { sp('page-home'); }
  function goFiles() { sp('page-files'); showFolderLv(); }
  function goViewer() { location.href = 'viewer.html'; }

  function sp(id) {
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  /* ── 파일 탐색 ── */
  function openFolder(n) {
    document.getElementById('folderGrid').style.display = 'none';
    document.getElementById('fileGrid').style.display = 'grid';
    document.getElementById('filesTitle').innerHTML = '<span style="color:#94a3b8;font-weight:500;font-size:.9rem;">내 프로젝트 &rsaquo;</span> ' + n;
  }
  function showFolderLv() {
    document.getElementById('folderGrid').style.display = 'grid';
    document.getElementById('fileGrid').style.display = 'none';
    document.getElementById('filesTitle').textContent = '내 프로젝트';
  }
  </script>
</body>

</html>
